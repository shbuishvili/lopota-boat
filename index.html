<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lopota Boat Race — Mini Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">
          <img id="logoPreview" alt="Lopota logo" src="assets/lopota-logo.svg" />
          <div>
            <h1>Lopota Lake Resort &amp; Spa — Boat Race</h1>
            <p>დეპარტამენტების შეჯიბრი • ნავი + მაისური ლოგოთი • Space = Paddle</p>
          </div>
        </div>
        <div class="panel" style="padding:12px 14px; display:flex; gap:10px; align-items:center;">
          <span class="kbd">Space</span>
          <span style="color: var(--muted); font-size:12.5px;">Paddle</span>
          <span class="kbd">R</span>
          <span style="color: var(--muted); font-size:12.5px;">Reset</span>
        </div>
      </header>

      <div class="top">
        <div class="panel controls">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
            <div>
              <div style="font-weight:800; letter-spacing:.2px;">Setup</div>
              <div style="font-size:12.5px; color:var(--muted); margin-top:2px;">აირჩიე დეპარტამენტი და დაიწყე რბოლა</div>
            </div>
          </div>

          <div class="row">
            <label>
              Department
              <select id="dept"></select>
            </label>
            <label>
              Difficulty
              <select id="difficulty">
                <option value="1">Easy</option>
                <option value="2" selected>Normal</option>
                <option value="3">Hard</option>
              </select>
            </label>
          </div>

          <div class="row">
            <label>
              Departments (lanes)
              <select id="lanes">
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6" selected>6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
              </select>
            </label>
            <label>
              Track length (m)
              <input id="length" type="number" min="700" max="2600" step="50" value="1300" />
            </label>
          </div>

          <div class="row">
            <label>
              Upload logo (PNG/SVG)
              <input id="logoFile" type="file" accept="image/*" />
            </label>
            <label>
              Logo options
              <button id="clearLogo" type="button">Use default</button>
            </label>
          </div>

          <div class="btnrow">
            <button id="start" class="primary" type="button">Start</button>
            <button id="paddle" type="button" disabled>Paddle</button>
          </div>

          <div class="footer">
            <div>Tip: არ “ასპამო” — სწორი ტემპი უფრო სწრაფია.</div>
          </div>
        </div>

        <div class="panel hud">
          <div class="status">
            <div class="chip">
              <span id="statusDot" class="dot warn"></span>
              <span id="statusText" style="font-weight:750;">Ready</span>
            </div>
            <div class="chip" title="Use the Lopota logo on boat + shirt">
              <span style="color:var(--muted); font-size:12.5px;">Logo:</span>
              <span style="font-weight:800;">Boat • Shirt</span>
            </div>
          </div>
          <div id="bars" class="bars"></div>
        </div>
      </div>

      <div class="panel game">
        <canvas id="game" aria-label="Boat race game canvas"></canvas>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lopota Boat Race — Mini Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="brand">
          <img id="logoPreview" alt="Lopota logo" src="assets/lopota-logo.svg" />
          <div>
            <h1>Lopota Lake Resort &amp; Spa — Boat Race</h1>
            <p>Multiplayer lobby (≥3) • Space = Paddle • ერთი ლინკით ყველანი</p>
          </div>
        </div>
        <div class="panel" style="padding:12px 14px; display:flex; gap:10px; align-items:center;">
          <span class="kbd">Space</span>
          <span style="color: var(--muted); font-size:12.5px;">Paddle</span>
          <span class="kbd">R</span>
          <span style="color: var(--muted); font-size:12.5px;">Reset</span>
        </div>
      </header>

      <div class="top">
        <div class="panel controls">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
            <div>
              <div style="font-weight:800; letter-spacing:.2px;">Lobby</div>
              <div style="font-size:12.5px; color:var(--muted); margin-top:2px;">Start აქტიურდება როცა მოთამაშეები ≥ 3</div>
            </div>
          </div>

          <div class="row">
            <label>
              Your name
              <input id="playerName" type="text" placeholder="მაგ: Nino" style="width:100%; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.22); color:var(--text); outline:none;" />
            </label>
            <label>
              Department
              <select id="dept"></select>
            </label>
          </div>

          <div class="row">
            <label>
              Track length (m)
              <input id="length" type="number" min="700" max="2600" step="50" value="1300" />
            </label>
            <label>
              Upload logo (PNG/SVG)
              <input id="logoFile" type="file" accept="image/*" />
            </label>
          </div>

          <div class="row" style="grid-template-columns: 1fr;">
            <label>
              Share link (same room)
              <div style="display:flex; gap:10px; align-items:center;">
                <input id="shareLink" type="text" readonly style="flex:1; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(0,0,0,.22); color:var(--text); outline:none;" />
                <button id="copyLink" type="button">Copy</button>
              </div>
            </label>
          </div>

          <div class="btnrow">
            <button id="start" class="primary" type="button" disabled>Start</button>
            <button id="paddle" type="button" disabled>Paddle</button>
            <button id="boost" type="button" disabled>აჩქარება</button>
            <button id="reset" type="button">Reset</button>
          </div>

          <div class="footer">
            <div id="connHint">Connecting…</div>
          </div>
        </div>

        <div class="panel hud">
          <div class="status">
            <div class="chip">
              <span id="statusDot" class="dot warn"></span>
              <span id="statusText" style="font-weight:750;">Waiting for players…</span>
            </div>
            <div class="chip" title="Use the Lopota logo on boat + shirt">
              <span style="color:var(--muted); font-size:12.5px;">Logo:</span>
              <span style="font-weight:800;">Boat • Shirt</span>
            </div>
          </div>
          <div class="status" style="justify-content:flex-start;">
            <div class="chip">
              <span style="color:var(--muted); font-size:12.5px;">Room:</span>
              <span id="roomId" style="font-weight:850;">—</span>
            </div>
            <div class="chip">
              <span style="color:var(--muted); font-size:12.5px;">Players:</span>
              <span id="playerCount" style="font-weight:850;">0</span>
            </div>
          </div>
          <div id="bars" class="bars"></div>
        </div>
      </div>

      <div class="panel game">
        <canvas id="game" aria-label="Boat race game canvas"></canvas>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
